<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <section class="image">
        <img src="./image.jpg">
        <div class="title">Sign-up Form</div>
        <p class="credit">Photo by <a href="https://unsplash.com/@marekpiwnicki?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Marek Piwnicki</a> on <a href="https://unsplash.com/photos/jagged-mountain-peaks-under-a-clear-blue-sky-HSMUxC_oGIw?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </p>
    </section>
    <section class="form">
        <form action="">
            <fieldset class="intro">
                <legend>Welcome to our community!</legend>
                <p>Join us today and start enjoying the benefits of being a member. Create your account now and be part of our amazing community.</p>
            </fieldset>
            <fieldset class="input">
                <div class="input-group">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name" name="first-name" required>
                </div>
                <div class="input-group">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name" name="last-name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="phone-number">Phone Number</label>
                    <input type="tel" id="phone-number" name="phone-number" required>
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                </div>
            </fieldset>
            <fieldset class="signin">
                <button type="submit">Create Account</button>
                <p>Already have an account? <a href="#">Sign in</a></p>    
            </fieldset>
            
        </form>
    </section>
</body>
</html>
